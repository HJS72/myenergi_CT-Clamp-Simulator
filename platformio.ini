[common]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.2
    adafruit/Adafruit GFX Library@^1.11.10
    adafruit/Adafruit SH110X@^2.1.12
    olikraus/U8g2@^2.36.6
    Wire
    SPI

build_flags =
    -D MQTT_MAX_PACKET_SIZE=1024
    -std=c++17

extra_scripts =
    post:scripts/copy_boot_app0.py

upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

[env:esp32]
extends = common
build_src_filter = +<*> -<master_slave_main.cpp>

[env:esp32-master]
extends = common
build_src_filter = +<*> -<main.cpp>
upload_speed = 115200
build_flags = 
    ${common.build_flags}
    -D DEVICE_MODE=1

[env:esp32-slave]
extends = common
build_src_filter = +<*> -<main.cpp>
build_flags = 
    ${common.build_flags}
    -D DEVICE_MODE=2

