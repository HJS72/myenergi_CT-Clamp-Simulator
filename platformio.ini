[common]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.2
    Wire
    SPI

build_flags =
    -D MQTT_MAX_PACKET_SIZE=1024
    -std=c++17

upload_port = /dev/cu.SLAB_USBtoUART
monitor_port = /dev/cu.SLAB_USBtoUART

[env:esp32]
extends = common
description = Standalone Single ESP32 (WiFi + MQTT + All Phases A,B,C)
src_filter = +<*> -<master_slave_main.cpp>

[env:esp32-master]
extends = common
description = Master ESP32 (WiFi + MQTT + Phase A only, controls Slave)
src_filter = +<*> -<main.cpp>
build_flags = 
    ${common.build_flags}
    -D DEVICE_MODE_MASTER

[env:esp32-slave]
extends = common
description = Slave ESP32 (Phase B+C via UART, no WiFi, low power)
src_filter = +<*> -<main.cpp>
build_flags = 
    ${common.build_flags}
    -D DEVICE_MODE_SLAVE
