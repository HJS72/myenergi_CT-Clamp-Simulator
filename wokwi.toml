[wokwi]
version = 1
firmware = ".pio/build/esp32-master/firmware.bin"
elf = ".pio/build/esp32-master/firmware.elf"
# vcdFile disabled: no logic analyzer in diagram

# Master-Slave ESP32 simulation (2x boards + UART)
# 
# BUILD:
# 1. pio run -e esp32-master
# 2. pio run -e esp32-slave
#
# THEN:
# Open diagram.json in VS Code with Wokwi extension
# Press Ctrl+Shift+P -> "Wokwi: Start Simulator"
